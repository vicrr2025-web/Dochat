server:
  port: 8080

spring:
  application:
    name: dochatapp-server

  datasource:
    url: jdbc:postgresql://localhost:5432/dochat_dev
    username: claude
    password:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  security:
    user:
      name: admin
      password: admin123

logging:
  level:
    com.dochat: DEBUG
