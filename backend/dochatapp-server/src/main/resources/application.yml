server:
  port: 8080

spring:
  application:
    name: dochatapp-server

  datasource:
    url: jdbc:postgresql://localhost:5432/dochat_dev
    username: claude
    password:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  security:
    user:
      name: admin
      password: admin123

# JWT 配置
jwt:
  secret: dochatapp-jwt-secret-key-change-in-production-must-be-at-least-256-bits
  expiration: 86400000          # 24小时（毫秒）
  refresh-expiration: 2592000000 # 30天（毫秒）

# 腾讯IM配置（密钥到位后替换占位符）
tencent:
  im:
    sdk-app-id: 1600148063
    secret-key: PLACEHOLDER_TENCENT_IM_SECRET_KEY
    expire-time: 604800          # UserSig 有效期7天（秒）

# 腾讯云短信配置（密钥到位后替换占位符）
tencent:
  sms:
    app-id: PLACEHOLDER_SMS_APP_ID
    secret-id: PLACEHOLDER_SMS_SECRET_ID
    secret-key: PLACEHOLDER_SMS_SECRET_KEY
    sign-name: Dochat
    template-id-register: PLACEHOLDER_TEMPLATE_ID
    template-id-login: PLACEHOLDER_TEMPLATE_ID
    template-id-reset: PLACEHOLDER_TEMPLATE_ID

# Mock模式（开发阶段开启，密钥到位后关闭）
app:
  mock:
    sms: true                    # true=日志输出验证码，false=调用真实短信API
    im: true                     # true=本地生成UserSig，false=调用腾讯IM API

logging:
  level:
    com.dochat: DEBUG
