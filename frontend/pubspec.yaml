name: dochat_app
description: "Dochat - 极简联络，一诺可守"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 国际化
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # 网络请求
  dio: ^5.4.0

  # 安全存储（Token）
  flutter_secure_storage: ^9.2.0

  # 状态管理
  provider: ^6.1.0
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: false
